name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller --onefile --windowed --name "AudioLatencyDetector" audio_latency_detector.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/AudioLatencyDetector.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller --onedir --windowed --name "Audio Latency Detector" audio_latency_detector.py
      - run: cd dist && zip -r "AudioLatencyDetector-mac.zip" "Audio Latency Detector.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/AudioLatencyDetector-mac.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-exe/AudioLatencyDetector.exe
            macos-app/AudioLatencyDetector-mac.zip
